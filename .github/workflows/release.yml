name: Build and Release Module

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g. v1.1.0)'
        required: true
        default: 'v1.1.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch all history for changelog generation

    - name: Update module.prop
      run: |
        # Set version string to the user input
        sed -i "s/^version=.*/version=${{ github.event.inputs.version }}/" module.prop
        # Set versionCode to the runner execution number
        sed -i "s/^versionCode=.*/versionCode=${{ github.run_number }}/" module.prop
        
        echo "Updated module.prop:"
        cat module.prop

    - name: Commit and Push Version Update
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Only commit and push if there are actual changes to module.prop
        if ! git diff --quiet module.prop; then
          git add module.prop
          git commit -m "chore: release ${{ github.event.inputs.version }} [skip ci]"
          git push origin HEAD:${{ github.ref }}
        else
          echo "No changes in module.prop. Skipping commit and push."
        fi

    - name: Generate Changelog
      id: changelog
      run: |
        # Fetch tags to find previous version
        git fetch --tags --force
        
        # Get previous tag (ignoring the tag we are about to create)
        # git describe finds the closest tag in history
        previous_tag=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || true)
        
        echo "## Changelog" > changelog.txt
        if [ -z "$previous_tag" ]; then
          echo "No previous release tag found. Logging all commits:"
          git log --pretty=format:"* %s (%h) - %an" HEAD >> changelog.txt
        else
          echo "Previous tag: $previous_tag. Logging commits since $previous_tag:"
          git log --pretty=format:"* %s (%h) - %an" ${previous_tag}..HEAD >> changelog.txt
        fi
        
        echo "" >> changelog.txt
        echo "### Verification hashes" >> changelog.txt
        echo "Generated by GitHub Actions Run ID: ${{ github.run_id }}" >> changelog.txt
        
        echo "Generated changelog:"
        cat changelog.txt

    - name: Build Flashable Zip
      run: |
        # Build optimized production zip utilizing git archive (ignores README/git files as specified in .gitattributes)
        git archive --format=zip --output=SweetClocker-${{ github.event.inputs.version }}.zip HEAD
        
        echo "Zip structure verification:"
        unzip -l SweetClocker-${{ github.event.inputs.version }}.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: Release ${{ github.event.inputs.version }}
        body_path: changelog.txt
        draft: false
        prerelease: false
        files: |
          SweetClocker-${{ github.event.inputs.version }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
